<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <polygon points="15,35 25,10 38,30" fill="#555"/>
  <polygon points="62,30 75,10 85,35" fill="#555"/>
  <!-- Head -->
  <circle cx="50" cy="52" r="35" fill="#555"/>
  <!-- Inner ears -->
  <polygon points="19,33 26,15 36,30" fill="#ff9999"/>
  <polygon points="64,30 74,15 81,33" fill="#ff9999"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="45" rx="7" ry="8" fill="white"/>
  <ellipse cx="63" cy="45" rx="7" ry="8" fill="white"/>
  <circle cx="38" cy="46" r="4" fill="#222"/>
  <circle cx="64" cy="46" r="4" fill="#222"/>
  <circle cx="39" cy="44" r="1.5" fill="white"/>
  <circle cx="65" cy="44" r="1.5" fill="white"/>
  <!-- Nose -->
  <polygon points="50,58 46,63 54,63" fill="#ff9999"/>
  <!-- Mouth -->
  <path d="M46,63 Q50,68 54,63" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Whiskers -->
  <line x1="20" y1="60" x2="44" y2="62" stroke="#ccc" stroke-width="1.5"/>
  <line x1="20" y1="65" x2="44" y2="64" stroke="#ccc" stroke-width="1.5"/>
  <line x1="56" y1="62" x2="80" y2="60" stroke="#ccc" stroke-width="1.5"/>
  <line x1="56" y1="64" x2="80" y2="65" stroke="#ccc" stroke-width="1.5"/>
</svg>
